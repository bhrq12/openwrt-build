# 自定义 feeds 配置
# 此文件会被追加到 OpenWrt 源码的 feeds.conf.default 中
#
# 格式说明:
#   src-link <name> <path>    # 本地软件包（相对路径，相对于 OpenWrt 源码根目录）
#   src-git  <name> <url>[<branch>]  # 远程 Git 仓库
#
# 更多格式参考: https://openwrt.org/docs/guide-developer/feeds

# Lean 扩展包（可选，取消注释启用）
# src-git lean_packages https://github.com/coolsnowwolf/packages

# LuCI 主题（可选，取消注释并修改为你的主题仓库）
# src-git luci_theme https://github.com/你的用户名/luci-theme-xxx

# 自定义本地软件包示例（取消注释并修改路径）
# 在 OpenWrt 源码目录下创建软链接或放置软件包源码
# src-link mypackages /path/to/my-packages
