name: openwrt toolchain cache build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - ipq40xx
          - x86_64
          - bcm2711
          - ramips-mt7621
      artifact:
        description: "Build artifact"
        required: true
        type: choice
        options:
          - firmware
          - packages
          - both
        default: packages
      openwrt_version:
        description: "OpenWrt source (branch/tag/commit)"
        required: false
        default: master
      custom_config_url:
        description: "Custom .config raw URL (optional)"
        required: false
        default: ""

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      artifact:
        required: false
        type: string
        default: packages
      openwrt_version:
        required: false
        type: string
        default: master
      custom_config_url:
        required: false
        type: string
        default: ""
    outputs:
      firmware_artifact:
        description: "Firmware artifact name"
        value: ${{ jobs.build.outputs.firmware_artifact }}
      packages_artifact:
        description: "Packages artifact name"
        value: ${{ jobs.build.outputs.packages_artifact }}

concurrency:
  group: build-${{ inputs.platform }}-${{ inputs.openwrt_version }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/coolsnowwolf/lede
  ACCTL_REPO: https://github.com/bhrq12/acctl
  ACCTL_BRANCH: main
  TOOLCHAIN_TAG: Toolchain
  BUILD_THREADS: $(nproc)

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-min: 360
    outputs:
      firmware_artifact: ${{ steps.artifact_names.outputs.firmware }}
      packages_artifact: ${{ steps.artifact_names.outputs.packages }}

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Install dependencies (include squashfs-tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zstd zlib1g-dev file make \
            squashfs-tools

      # ==========================
      # 平台 + 产物名
      # ==========================
      - name: Platforms & artifact names
        id: platforms
        run: echo "platforms=${{ inputs.platform }}" >> $GITHUB_OUTPUT

      - name: Generate artifact names
        id: artifact_names
        run: |
          VERSION_SHORT=$(echo "${{ inputs.openwrt_version }}" | head -c7)
          echo "firmware=openwrt-firmware-${{ inputs.platform }}-$VERSION_SHORT-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "packages=openwrt-packages-${{ inputs.platform }}-$VERSION_SHORT-$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      # ==========================
      # 工具链哈希（来自第一个工作流）
      # ==========================
      - name: Get toolchain hash (tools/toolchain only)
        id: toolchain_hash
        run: |
          TMP=$(mktemp -d)
          git clone --depth=1 -b ${{ inputs.openwrt_version }} $OPENWRT_REPO $TMP/openwrt
          HASH=$(cd $TMP/openwrt && git log --pretty=tformat:"%H" -n1 tools toolchain)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "image=toolchain-${{ inputs.platform }}-$HASH" >> $GITHUB_OUTPUT
          rm -rf $TMP

      # ==========================
      # 检查工具链是否存在（第一个工作流逻辑）
      # ==========================
      - name: Check if toolchain exists
        id: check_toolchain
        env:
          GH: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE=${{ steps.toolchain_hash.outputs.image }}
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://github.com/${{ github.repository }}/releases/download/$TOOLCHAIN_TAG/$IMAGE.img.00)
          if [ $CODE -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ==========================
      # 下载 + overlay 挂载工具链（吸收第一个工作流最强提速技术）
      # ==========================
      - name: Download and mount toolchain (SQUASHFS + OVERLAY)
        id: mount_toolchain
        if: steps.check_toolchain.outputs.exists == 'true'
        run: |
          mkdir -p workspace dl openwrt-ro overlay workdir
          cd workspace
          # 下载工具链分块
          for i in $(seq 0 9); do
            curl -fL https://github.com/${{ github.repository }}/releases/download/$TOOLCHAIN_TAG/${{ steps.toolchain_hash.outputs.image }}.img.0$i >> toolchain.img || break
          done
          # overlay 挂载（秒加载，不用解压！）
          sudo mount -o loop toolchain.img ../openwrt-ro
          sudo mount -t overlay overlay -o lowerdir=../openwrt-ro,upperdir=../overlay,workdir=../workdir ../openwrt
          echo "ready=true" >> $GITHUB_OUTPUT
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      # ==========================
      # 未命中缓存 → 全新编译工具链
      # ==========================
      - name: Full build (no toolchain cache)
        if: steps.check_toolchain.outputs.exists != 'true'
        run: |
          git clone --depth=1 -b ${{ inputs.openwrt_version }} $OPENWRT_REPO openwrt
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cp $GITHUB_WORKSPACE/configs/${{ inputs.platform }}.config .config
          make defconfig
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          # 打包成 squashfs （第一个工作流的技术）
          cd ..
          mksquashfs openwrt toolchain.img -comp zstd -all-root
          split -b 1900M toolchain.img ${{ steps.toolchain_hash.outputs.image }}.img.
          mkdir -p output
          cp ${{ steps.toolchain_hash.outputs.image }}.* output/
          echo ${{ steps.toolchain_hash.outputs.hash }} > output/${{ steps.toolchain_hash.outputs.image }}.hash

      - name: Upload new toolchain
        if: steps.check_toolchain.outputs.exists != 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TOOLCHAIN_TAG }}
          allowUpdates: true
          artifacts: output/*
          token: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 通用：添加 acctl
      # ==========================
      - name: Add acctl
        run: |
          cd openwrt
          [ ! -d package/acctl ] && git clone --depth=1 $ACCTL_REPO package/acctl

      # ==========================
      # 加载配置
      # ==========================
      - name: Load config
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/configs/${{ inputs.platform }}.config .config
          make defconfig

      # ==========================
      # 只编译软件包（极快！）
      # ==========================
      - name: Compile ONLY packages (acctl + all)
        if: contains(inputs.artifact, 'packages')
        run: |
          cd openwrt
          make package/compile -j$(nproc)
          make package/index

      # ==========================
      # 编译完整固件
      # ==========================
      - name: Compile firmware
        if: contains(inputs.artifact, 'firmware')
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # ==========================
      # 上传产物
      # ==========================
      - name: Upload packages
        if: contains(inputs.artifact, 'packages')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_names.outputs.packages }}
          path: openwrt/bin/packages/

      - name: Upload firmware
        if: contains(inputs.artifact, 'firmware')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_names.outputs.firmware }}
          path: openwrt/bin/targets/
