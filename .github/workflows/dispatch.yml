name: OpenWrt Dispatch

on:
  workflow_dispatch:
    inputs:
      # ========== 平台选锟斤拷 ==========
      platforms:
        description: "Target platforms (space-separated, e.g. ipq40xx x86_64)"
        required: true
        type: string
        default: "ipq40xx"

      # ========== 源锟斤拷姹?==========
      openwrt_version:
        description: "OpenWrt source (branch/tag/commit)"
        required: true
        type: string
        default: "master"

      # ========== 锟斤拷锟斤拷锟斤拷锟斤拷 ==========
      artifact_type:
        description: "Build artifact type"
        required: true
        type: choice
        options:
          - firmware
          - packages
          - both
        default: "firmware"

      # ========== 锟竭硷拷选锟斤拷 ==========
      custom_openwrt_repo:
        description: "Custom OpenWrt repo URL (leave empty for default)"
        required: false
        type: string
        default: ""

      custom_acctl_repo:
        description: "Custom acctl repo URL (leave empty for default)"
        required: false
        type: string
        default: ""

      custom_acctl_branch:
        description: "Custom acctl branch/tag"
        required: false
        type: string
        default: "main"

      custom_config_url:
        description: "Custom .config raw URL (optional)"
        required: false
        type: string
        default: ""

      build_threads:
        description: "Build threads (0 = auto)"
        required: false
        type: string
        default: "0"

concurrency:
  group: dispatch-${{ inputs.platforms }}-${{ inputs.openwrt_version }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  # ========== 预锟斤拷锟?==========
  precheck:
    runs-on: ubuntu-latest
    outputs:
      platform_list: ${{ steps.parse_platforms.outputs.list }}
      validated: ${{ steps.validate.outputs.valid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse platform list
        id: parse_platforms
        run: |
          PLATFORMS="${{ inputs.platforms }}"
          VALID_PLATFORMS="ipq40xx x86_64 bcm2711 ramips-mt7621"

          read -ra PLATFORM_ARRAY <<< "$PLATFORMS"
          VALIDATED=""
          for p in "${PLATFORM_ARRAY[@]}"; do
            [[ -z "$p" ]] && continue
            if echo "$VALID_PLATFORMS" | grep -q "\b$p\b"; then
              VALIDATED="$VALIDATED $p"
            else
              echo "Warning: Invalid platform '$p', skipping"
            fi
          done
          VALIDATED=$(echo "$VALIDATED" | sed 's/^ //')

          if [[ -z "$VALIDATED" ]]; then
            echo "Error: No valid platforms"
            exit 1
          fi

          echo "Validated platforms: $VALIDATED"
          # Convert space-separated list to JSON array for matrix
          JSON_LIST=$(echo "$VALIDATED" | sed 's/ /", "/g')
          echo "list=[\"$JSON_LIST\"]" >> $GITHUB_OUTPUT

      - name: Validate version
        id: validate
        run: |
          VERSION="${{ inputs.openwrt_version }}"
          if [[ "$VERSION" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "Commit: $VERSION"
          elif [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "Tag: $VERSION"
          else
            echo "Branch: $VERSION"
          fi
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Summary precheck
        run: |
          echo "## Dispatch Precheck" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | \`${{ steps.parse_platforms.outputs.list }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenWrt Version | \`${{ inputs.openwrt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Type | \`${{ inputs.artifact_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain Strategy | \`AUTO (hash-based)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Toolchain**: Automatically determined by comparing tools/toolchain directory commit hash." >> $GITHUB_STEP_SUMMARY
          echo "No manual selection needed - cache is used if hash matches, rebuilt if not." >> $GITHUB_STEP_SUMMARY

  # ========== 锟斤拷锟斤拷锟斤拷平台锟斤拷锟斤拷 ==========
  build-platforms:
    needs: precheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.precheck.outputs.platform_list) }}
    steps:
      - name: Trigger build for ${{ matrix.platform }}
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'build.yml';
            const ref = '${{ github.ref }}';

            const inputs = {
              platform: '${{ matrix.platform }}',
              artifact: '${{ inputs.artifact_type }}',
              openwrt_version: '${{ inputs.openwrt_version }}',
              custom_config_url: '${{ inputs.custom_config_url }}'
            };

            console.log('Triggering build.yml with:', JSON.stringify(inputs, null, 2));

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: ref,
              inputs: inputs
            });

            console.log('Workflow triggered successfully');

  # ========== 锟斤拷锟斤拷 ==========
  summary:
    needs: [precheck, build-platforms]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## OpenWrt Dispatch Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Jobs Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          PLATFORMS="${{ needs.precheck.outputs.platform_list }}"
          for p in $PLATFORMS; do
            [[ -z "$p" ]] && continue
            echo "| \`$p\` | Triggered |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Actions** tab to monitor individual platform builds" >> $GITHUB_STEP_SUMMARY
          echo "2. Each platform runs in parallel as a separate job" >> $GITHUB_STEP_SUMMARY
          echo "3. Toolchain is auto-determined: hash-matched = reuse, mismatch = rebuild" >> $GITHUB_STEP_SUMMARY
          echo "4. Artifacts are retained for 14 days after completion" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| OpenWrt Version | \`${{ inputs.openwrt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Type | \`${{ inputs.artifact_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain | \`AUTO (hash-based)\` |" >> $GITHUB_STEP_SUMMARY

