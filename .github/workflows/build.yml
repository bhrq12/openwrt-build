name: OpenWrt Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - ipq40xx
          - x86_64
          - bcm2711
          - ramips-mt7621
          - all
      artifact:
        description: "Build artifact"
        required: true
        type: choice
        options:
          - firmware
          - packages
          - both
        default: firmware
      openwrt_version:
        description: "OpenWrt source (branch/tag/commit)"
        required: false
        default: master
        type: string
      source_ref:
        description: "Git branch/tag to clone (source code, default: master)"
        required: false
        default: master
        type: string
      custom_config_url:
        description: "Custom .config raw URL (optional)"
        required: false
        default: ""
        type: string

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      artifact:
        required: false
        type: string
        default: firmware
      openwrt_version:
        required: false
        type: string
        default: master
      source_ref:
        required: false
        default: master
        type: string
      custom_config_url:
        required: false
        type: string
        default: ""
    outputs:
      firmware_artifact:
        description: "Firmware artifact name"
        value: ${{ jobs.build.outputs.firmware_artifact }}
      packages_artifact:
        description: "Packages artifact name"
        value: ${{ jobs.build.outputs.packages_artifact }}

concurrency:
  group: build-${{ inputs.platform }}-${{ inputs.openwrt_version }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://github.com/coolsnowwolf/lede
  ACCTL_REPO: https://github.com/bhrq12/acctl
  ACCTL_BRANCH: main
  BUILD_THREADS: 1

# ============================================================
# Shared hash logic (used by both toolchain and build jobs)
# ============================================================
jobs:
  # ============================================================
  # Toolchain Job: 检查缓存 → 命中跳过，未命中则从源码构建并上传 Release
  # ============================================================
  toolchain:
    runs-on: ubuntu-22.04
    timeout-minutes: 480  # 工具链编译可能需要 6-8 小时

    outputs:
      toolchain_key: ${{ steps.tc_hash.outputs.key }}
      tc_hash: ${{ steps.tc_hash.outputs.hash }}
      matched: ${{ steps.check_tc.outputs.matched }}

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      # ========== 精准 Hash: 只取 tools/toolchain 目录的 commit ==========
      - name: Generate toolchain hash (tools/toolchain only)
        id: tc_hash
        run: |
          REPO="$OPENWRT_REPO"
          VERSION="${{ inputs.openwrt_version }}"

          TEMP_DIR=$(mktemp -d)
          if ! git clone --depth=1 -b "$VERSION" "$REPO" "$TEMP_DIR/openwrt" 2>/dev/null; then
            echo "ERROR: Clone failed"
            rm -rf "$TEMP_DIR"
            exit 1
          fi

          TC_HASH=$(cd "$TEMP_DIR/openwrt" && git log --pretty=tformat:"%H" -n1 tools toolchain 2>/dev/null || echo "")

          if [[ -z "$TC_HASH" ]]; then
            TC_HASH=$(git ls-remote "$REPO" refs/heads/$VERSION 2>/dev/null | head -c 7 || echo "unknown")
          fi

          rm -rf "$TEMP_DIR"

          CACHE_KEY="toolchain-${{ inputs.platform }}-${TC_HASH}"
          echo "hash=$TC_HASH" >> $GITHUB_OUTPUT
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Toolchain hash: $TC_HASH"
          echo "Cache key: $CACHE_KEY"

      # ========== 检查 Release 中的 hash 是否匹配 ==========
      - name: Check toolchain hash in Releases
        id: check_tc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHE_KEY="${{ steps.tc_hash.outputs.key }}"
          TC_HASH="${{ steps.tc_hash.outputs.hash }}"

          echo "Checking toolchain cache for key: $CACHE_KEY"

          if ! gh release view "$CACHE_KEY" &>/dev/null; then
            echo "Release not found: $CACHE_KEY"
            echo "matched=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 下载 hash 文件（极小，秒级）
          HASH_FILE=$(mktemp)
          if gh release download "$CACHE_KEY" --pattern "*.hash" -O "$HASH_FILE" 2>/dev/null; then
            REMOTE_HASH=$(cat "$HASH_FILE" | tr -d " \n")
            echo "Remote hash: $REMOTE_HASH"
            echo "Local hash:  $TC_HASH"

            if [[ "$REMOTE_HASH" == "$TC_HASH" ]]; then
              echo "Hash MATCHED - toolchain cache is valid, skipping build"
              echo "matched=true" >> $GITHUB_OUTPUT
            else
              echo "Hash MISMATCH - will rebuild toolchain"
              echo "matched=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No .hash file in release, cannot verify, rebuilding"
            echo "matched=false" >> $GITHUB_OUTPUT
          fi

          rm -f "$HASH_FILE"

      # ========== 构建工具链（仅当 hash 未命中时） ==========
      - name: Build toolchain from source
        if: steps.check_tc.outputs.matched != 'true'
        run: |
          echo "=== Building toolchain from source (cache miss) ==="

          # 设置构建环境
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zstd \
            zlib1g-dev file make pkg-config coreutils

          SOURCE_DIR="${{ github.workspace }}/openwrt"
          VERSION="${{ inputs.openwrt_version }}"

          # 克隆源码（带重试）
          for i in 1 2 3; do
            echo "Cloning OpenWrt ($i/3)..."
            if git clone --depth=1 -b "$VERSION" "$OPENWRT_REPO" "$SOURCE_DIR" 2>&1; then
              echo "Clone successful"
              break
            fi
            rm -rf "$SOURCE_DIR"
            [[ $i -lt 3 ]] && sleep 10
          done

          if [[ ! -d "$SOURCE_DIR/.git" ]]; then
            echo "ERROR: Clone failed"
            exit 1
          fi

          # 应用平台配置
          cd "$SOURCE_DIR"
          CONFIG_FILE="${{ github.workspace }}/configs/${{ inputs.platform }}.config"
          if [[ -f "$CONFIG_FILE" ]]; then
            cp "$CONFIG_FILE" .config
          else
            echo "ERROR: No config for platform ${{ inputs.platform }}"
            exit 1
          fi

          # 强制启用工具链编译选项
          cat >> .config << 'EOF'
CONFIG_TOOLCHAINOPTS=y
CONFIG_DEVEL=y
CONFIG_CCACHE=n
EOF

          make defconfig

          echo "=== Compiling toolchain (threads: $(nproc)) ==="
          echo "Platform: ${{ inputs.platform }}"
          echo "Target: $(grep CONFIG_TARGET_ .config | head -1)"

          # 编译工具链：tools + toolchain
          if ! make tools/ninja -j$(nproc) V=s 2>&1 | tee "${{ github.workspace }}/logs/tools_ninja.log"; then
            echo "tools/ninja failed, retrying single thread..."
            make tools/ninja -j1 V=s 2>&1 | tee -a "${{ github.workspace }}/logs/tools_ninja.log"
          fi

          if ! make toolchain/compile -j$(nproc) V=s 2>&1 | tee "${{ github.workspace }}/logs/toolchain_compile.log"; then
            echo "toolchain/compile failed, retrying single thread..."
            make toolchain/compile -j1 V=s 2>&1 | tee -a "${{ github.workspace }}/logs/toolchain_compile.log"
          fi

          # 清理中间文件节省空间
          rm -rf .tmp-* dl
          echo "Toolchain build complete"

      # ========== 打包工具链并上传 Release（仅当 hash 未命中时） ==========
      - name: Package and upload toolchain
        if: steps.check_tc.outputs.matched != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHE_KEY="${{ steps.tc_hash.outputs.key }}"
          TC_HASH="${{ steps.tc_hash.outputs.hash }}"
          ARCHIVE_NAME="${CACHE_KEY}.tar.zst"
          OUTPUT_DIR="${{ github.workspace }}/toolchain_output"

          mkdir -p "$OUTPUT_DIR"

          cd "${{ github.workspace }}/openwrt"

          echo "Packaging: toolchain/ + build_dir/ + staging_dir/"
          echo "Archive: $ARCHIVE_NAME"

          tar -I "zstd -19" -cf "$OUTPUT_DIR/$ARCHIVE_NAME" \
            toolchain/ \
            build_dir/ \
            staging_dir/

          echo "$TC_HASH" > "$OUTPUT_DIR/${CACHE_KEY}.hash"
          sha256sum "$OUTPUT_DIR/$ARCHIVE_NAME" > "$OUTPUT_DIR/${ARCHIVE_NAME}.sha256"

          echo "Package size: $(du -h "$OUTPUT_DIR/$ARCHIVE_NAME" | cut -f1)"
          echo "Hash: $TC_HASH"

          echo ""
          echo "=== Uploading to GitHub Release: $CACHE_KEY ==="

          gh release create "$CACHE_KEY" \
            --title "Toolchain ${{ inputs.platform }} @ ${{ inputs.openwrt_version }}" \
            --notes "Automated toolchain build.

Platform: ${{ inputs.platform }}
Source: $OPENWRT_REPO (${{ inputs.openwrt_version }})
Hash (tools/toolchain): $TC_HASH

Files:
- ${ARCHIVE_NAME} (toolchain + build_dir + staging_dir)
- ${ARCHIVE_NAME}.sha256
- ${CACHE_KEY}.hash

Subsequent builds with the same hash will reuse this cached toolchain." \
            --prerelease || true

          gh release upload "$CACHE_KEY" \
            "$OUTPUT_DIR/$ARCHIVE_NAME" \
            "$OUTPUT_DIR/${ARCHIVE_NAME}.sha256" \
            "$OUTPUT_DIR/${CACHE_KEY}.hash" \
            --clobber

          echo ""
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/$CACHE_KEY"

  # ============================================================
  # Build Job: 等待 toolchain → 下载工具链 → 编译固件/软件包
  # ============================================================
  build:
    needs: toolchain
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    outputs:
      firmware_artifact: ${{ steps.artifact_names.outputs.firmware }}
      packages_artifact: ${{ steps.artifact_names.outputs.packages }}

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zstd \
            zlib1g-dev file make pkg-config wget curl jq coreutils

      - name: Generate artifact names
        id: artifact_names
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSION="${{ inputs.openwrt_version }}"
          VERSION_SHORT="${VERSION:0:7}"

          if [[ "${{ inputs.platform }}" == "all" ]]; then
            FIRMWARE="openwrt-firmware-all-${VERSION_SHORT}-${TIMESTAMP}"
            PACKAGES="openwrt-packages-all-${VERSION_SHORT}-${TIMESTAMP}"
          else
            FIRMWARE="openwrt-firmware-${{ inputs.platform }}-${VERSION_SHORT}-${TIMESTAMP}"
            PACKAGES="openwrt-packages-${{ inputs.platform }}-${VERSION_SHORT}-${TIMESTAMP}"
          fi

          echo "firmware=$FIRMWARE" >> $GITHUB_OUTPUT
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

      # ========== 下载工具链（从 toolchain job 的 Release） ==========
      - name: Download toolchain from Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHE_KEY="${{ needs.toolchain.outputs.toolchain_key }}"
          TC_DIR="${{ github.workspace }}/toolchain_cache"

          echo "Downloading toolchain: $CACHE_KEY"
          mkdir -p "$TC_DIR"

          if ! gh release download "$CACHE_KEY" \
            --pattern "*.tar.zst" \
            --dir "$TC_DIR" \
            --clobber 2>&1; then
            echo "ERROR: Failed to download toolchain"
            exit 1
          fi

          ARCHIVE=$(ls "$TC_DIR"/*.tar.zst 2>/dev/null | head -1)
          if [[ -z "$ARCHIVE" ]]; then
            echo "ERROR: No archive found"
            exit 1
          fi

          echo "Extracting: $ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"
          tar -I "zstd -d" -xf "$ARCHIVE" -C "$TC_DIR"

          if [[ -d "$TC_DIR/staging_dir" ]]; then
            echo "Toolchain ready: staging_dir ($(du -sh $TC_DIR/staging_dir | cut -f1))"
          else
            echo "ERROR: staging_dir not found after extraction"
            ls -la "$TC_DIR"
            exit 1
          fi

      # ========== 克隆 OpenWrt 源码（带重试） ==========
      - name: Clone OpenWrt source
        id: clone_source
        run: |
          SOURCE_DIR="${{ github.workspace }}/openwrt"
          VERSION="${{ inputs.source_ref }}"
          RETRY=3
          INTERVAL=10

          for i in $(seq 1 $RETRY); do
            echo "Cloning OpenWrt ($i/$RETRY): $VERSION"
            if git clone --depth=1 -b "$VERSION" "$OPENWRT_REPO" "$SOURCE_DIR" 2>&1; then
              echo "Clone successful"
              echo "cloned=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Clone failed, attempt $i/$RETRY"
            rm -rf "$SOURCE_DIR"
            [[ $i -lt $RETRY ]] && sleep $INTERVAL
          done

          echo "ERROR: Clone failed after $RETRY attempts"
          echo "cloned=false" >> $GITHUB_OUTPUT
          exit 1

      # ========== 注入工具链到源码目录 ==========
      - name: Inject toolchain
        run: |
          SOURCE_DIR="${{ github.workspace }}/openwrt"
          TC_DIR="${{ github.workspace }}/toolchain_cache"

          echo "Injecting toolchain from: $TC_DIR"

          # 备份已有的 staging_dir（如果有）
          if [[ -d "$SOURCE_DIR/staging_dir" ]]; then
            mv "$SOURCE_DIR/staging_dir" "$SOURCE_DIR/staging_dir.fresh_build"
          fi

          # 注入 toolchain/ build_dir/ staging_dir
          [[ -d "$TC_DIR/toolchain" ]] && cp -r "$TC_DIR/toolchain" "$SOURCE_DIR/toolchain" && echo "Injected: toolchain/"
          [[ -d "$TC_DIR/build_dir" ]] && cp -r "$TC_DIR/build_dir" "$SOURCE_DIR/build_dir" && echo "Injected: build_dir/"
          [[ -d "$TC_DIR/staging_dir" ]] && cp -r "$TC_DIR/staging_dir" "$SOURCE_DIR/staging_dir" && echo "Injected: staging_dir/"

          # 创建就绪标记
          touch "$SOURCE_DIR/staging_dir/.toolchain_ready"

          echo "Toolchain injection complete"

      # ========== 添加 acctl ==========
      - name: Add acctl package
        run: |
          cd "${{ github.workspace }}/openwrt"

          if [[ ! -d "package/acctl" ]]; then
            git clone --depth=1 -b "$ACCTL_BRANCH" "$ACCTL_REPO" package/acctl
            echo "acctl package added"
          else
            echo "acctl already exists"
          fi

      # ========== 应用 feeds ==========
      - name: Apply custom feeds
        run: |
          cd "${{ github.workspace }}/openwrt"

          FEEDS_CONF="${{ github.workspace }}/configs/feeds.conf"
          if [[ -f "$FEEDS_CONF" ]]; then
            echo "Applying custom feeds..."
            cat "$FEEDS_CONF" >> feeds.conf.default
          fi

          ./scripts/feeds update -a 2>&1 | tail -5 || true
          ./scripts/feeds install -a 2>&1 | tail -5 || true

      # ========== 下载自定义配置 ==========
      - name: Download custom config
        if: inputs.custom_config_url != ''
        run: |
          curl -fsSL "${{ inputs.custom_config_url }}" -o custom_config_download
          if [[ ! -s custom_config_download ]]; then
            echo "ERROR: Downloaded config is empty"
            exit 1
          fi
          echo "Config downloaded ($(wc -l < custom_config_download) lines)"

      # ========== 确定编译平台 ==========
      - name: Determine platforms to build
        id: platforms
        run: |
          if [[ "${{ inputs.platform }}" == "all" ]]; then
            PLATFORMS="ipq40xx x86_64 bcm2711 ramips-mt7621"
          else
            PLATFORMS="${{ inputs.platform }}"
          fi
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "Platforms to build: $PLATFORMS"

      # ========== 执行编译脚本 ==========
      - name: Build platforms
        run: |
          chmod +x "${{ github.workspace }}/scripts/build.sh"

          export PLATFORMS="${{ steps.platforms.outputs.platforms }}"
          export ARTIFACT="${{ inputs.artifact }}"
          export OPENWRT_VERSION="${{ inputs.openwrt_version }}"
          export OPENWRT_REPO
          export ACCTL_REPO
          export ACCTL_BRANCH
          export TOOLCHAIN_DIR="${{ github.workspace }}/toolchain_cache"

          echo "Using cached toolchain: $TOOLCHAIN_DIR"

          if [[ "${{ inputs.custom_config_url }}" != "" ]]; then
            export CUSTOM_CONFIG="${{ github.workspace }}/custom_config_download"
          fi

          cd "${{ github.workspace }}"
          "${{ github.workspace }}/scripts/build.sh"

      # ========== 收集固件 ==========
      - name: Prepare firmware artifacts
        if: contains(inputs.artifact, 'firmware')
        run: |
          mkdir -p firmware-output

          cd "${{ github.workspace }}/openwrt"

          find bin/targets -type f \( \
            -name "*.bin" -o \
            -name "*.img" -o \
            -name "*.img.gz" -o \
            -name "*.squashfs" \
          \) 2>/dev/null | while read -r f; do
            cp -v "$f" "${{ github.workspace }}/firmware-output/"
          done

          {
            echo "Build Date: $(date)"
            echo "Platform: ${{ inputs.platform }}"
            echo "OpenWrt Version: ${{ inputs.openwrt_version }}"
            echo "Toolchain Key: ${{ needs.toolchain.outputs.toolchain_key }}"
            echo "Toolchain Hash: ${{ needs.toolchain.outputs.tc_hash }}"
            echo "Toolchain Cache: ${{ needs.toolchain.outputs.matched }}"
            echo ""
            echo "Files:"
            ls -lh "${{ github.workspace }}/firmware-output/" 2>/dev/null || echo "No files"
          } > "${{ github.workspace }}/firmware-output/BUILD_INFO.txt"

      - name: Upload firmware artifact
        if: contains(inputs.artifact, 'firmware')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_names.outputs.firmware }}
          path: firmware-output/
          retention-days: 14
          compression-level: 9

      # ========== 收集软件包 ==========
      - name: Prepare package artifacts
        if: contains(inputs.artifact, 'packages')
        run: |
          mkdir -p packages-output

          cd "${{ github.workspace }}/openwrt"

          find bin/packages -type f -name "*.ipk" 2>/dev/null | while read -r f; do
            cp -v "$f" "${{ github.workspace }}/packages-output/"
          done

          if [[ -f "bin/packages/Packages.gz" ]]; then
            cp -v bin/packages/Packages.gz "${{ github.workspace }}/packages-output/"
          fi

          PKG_COUNT=$(find "${{ github.workspace }}/packages-output" -name "*.ipk" 2>/dev/null | wc -l)
          echo "Total packages: $PKG_COUNT"

      - name: Upload packages artifact
        if: contains(inputs.artifact, 'packages')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_names.outputs.packages }}
          path: packages-output/
          retention-days: 14
          compression-level: 9

      # ========== 构建摘要 ==========
      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ inputs.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`${{ inputs.artifact }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenWrt | \`${{ inputs.openwrt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain Key | \`${{ needs.toolchain.outputs.toolchain_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain Hash | \`${{ needs.toolchain.outputs.tc_hash }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain Cache | \`${{ needs.toolchain.outputs.matched }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Source Cloned | \`${{ steps.clone_source.outputs.cloned }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -d "firmware-output" ]]; then
            echo "### Firmware Files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh firmware-output/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -d "packages-output" ]]; then
            PKG_COUNT=$(find packages-output -name "*.ipk" 2>/dev/null | wc -l)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Packages: $PKG_COUNT files" >> $GITHUB_STEP_SUMMARY
          fi
