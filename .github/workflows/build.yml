name: OpenWrt Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - ipq40xx
          - x86_64
          - bcm2711
          - ramips-mt7621
          - all
      artifact:
        description: 'Build artifact'
        required: true
        type: choice
        options:
          - firmware     # 完整固件
          - packages     # 仅 ipk 软件包
          - both         # 两者都编译

concurrency:
  group: build-${{ inputs.platform }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Select platform config
        run: |
          if [ "${{ inputs.platform }}" = "all" ]; then
            echo "PLATFORMS=ipq40xx x86_64 bcm2711 ramips-mt7621" >> $GITHUB_ENV
          else
            echo "PLATFORMS=${{ inputs.platform }}" >> $GITHUB_ENV
          fi

      - name: Build platforms
        run: ./scripts/build.sh
        env:
          PLATFORMS: ${{ env.PLATFORMS }}
          ARTIFACT: ${{ inputs.artifact }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload firmware artifacts
        if: contains(inputs.artifact, 'firmware')
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ inputs.platform }}
          path: |
            output/firmware/*.bin
            output/firmware/*.img
          retention-days: 14

      - name: Upload package artifacts
        if: contains(inputs.artifact, 'packages')
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages-${{ inputs.platform }}
          path: |
            output/packages/**/*.ipk
            output/packages/**/*.deb
          retention-days: 14
