name: Toolchain Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - ipq40xx
          - x86_64
          - bcm2711
          - ramips-mt7621
      openwrt_version:
        description: 'OpenWrt source version (branch/tag/commit)'
        required: true
        default: 'master'
        type: string
      force_rebuild:
        description: 'Force rebuild even if cache exists'
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      openwrt_version:
        required: true
        type: string
        default: 'master'
      force_rebuild:
        required: false
        type: boolean
        default: false
    outputs:
      cache_key:
        description: 'Toolchain cache key'
        value: ${{ jobs.build.outputs.cache_key }}
      cache_exists:
        description: 'Whether toolchain cache exists'
        value: ${{ jobs.build.outputs.cache_exists }}

env:
  OPENWRT_REPO: https://github.com/coolsnowwolf/lede

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    outputs:
      cache_key: ${{ steps.cache_key.outputs.key }}
      cache_exists: ${{ steps.check_cache.outputs.exists }}
    
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache_key
        run: |
          # 工具链缓存键格式: toolchain-{platform}-{version}-{hash}
          VERSION="${{ inputs.openwrt_version }}"
          PLATFORM="${{ inputs.platform }}"
          
          # 获取源码 commit hash (如果是分支则获取最新)
          if [[ "$VERSION" == "master" || "$VERSION" == "main" ]]; then
            COMMIT_HASH=$(git ls-remote "$OPENWRT_REPO" refs/heads/$VERSION 2>/dev/null | head -c 7)
          else
            # tag 或 commit
            COMMIT_HASH="$VERSION"
          fi
          
          CACHE_KEY="toolchain-${PLATFORM}-${COMMIT_HASH}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

      - name: Check existing cache in Releases
        id: check_cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHE_KEY="${{ steps.cache_key.outputs.key }}"
          
          # 检查 Release 中是否存在该工具链
          ASSET_URL=$(gh release view "$CACHE_KEY" --json assets --jq '.assets[0].url' 2>/dev/null || echo "")
          
          if [[ -n "$ASSET_URL" ]] && [[ "${{ inputs.force_rebuild }}" != "true" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Toolchain cache found: $CACHE_KEY"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No valid cache or force rebuild requested"
          fi

      - name: Setup build environment
        if: steps.check_cache.outputs.exists != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zstd \
            zlib1g-dev file make pkg-config

      - name: Clone OpenWrt source
        if: steps.check_cache.outputs.exists != 'true'
        run: |
          git clone --depth=1 -b "${{ inputs.openwrt_version }}" "$OPENWRT_REPO" openwrt
          cd openwrt

      - name: Apply platform config
        if: steps.check_cache.outputs.exists != 'true'
        run: |
          cd openwrt
          
          # 使用 placeholder 或实际 config
          CONFIG_FILE="configs/${{ inputs.platform }}.config"
          PLACEHOLDER="configs/${{ inputs.platform }}.config.placeholder"
          
          if [[ -f "../$CONFIG_FILE" ]]; then
            cp "../$CONFIG_FILE" .config
          elif [[ -f "../$PLACEHOLDER" ]]; then
            cp "../$PLACEHOLDER" .config
          else
            echo "Error: No config file for platform ${{ inputs.platform }}"
            exit 1
          fi
          
          # 生成最小配置（仅工具链）
          cat >> .config << 'EOF'
          # 强制编译工具链
          CONFIG_TOOLCHAINOPTS=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=n
          EOF
          
          make defconfig

      - name: Build toolchain
        if: steps.check_cache.outputs.exists != 'true'
        run: |
          cd openwrt
          
          echo "=== Building toolchain ==="
          echo "Platform: ${{ inputs.platform }}"
          echo "Target: $(grep CONFIG_TARGET_ .config | head -1)"
          
          # 编译工具链 (make toolchain/install)
          make toolchain/install -j$(nproc) V=s || {
            echo "Retrying with single thread..."
            make toolchain/install -j1 V=s
          }

      - name: Package toolchain
        if: steps.check_cache.outputs.exists != 'true'
        run: |
          cd openwrt
          
          # 打包工具链目录
          TOOLCHAIN_DIR="staging_dir"
          ARCHIVE_NAME="${{ steps.cache_key.outputs.key }}.tar.zst"
          
          echo "Packaging toolchain to $ARCHIVE_NAME..."
          tar -I 'zstd -19' -cf "$ARCHIVE_NAME" "$TOOLCHAIN_DIR"
          
          # 计算校验和
          sha256sum "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          
          # 移动到输出目录
          mkdir -p "$GITHUB_WORKSPACE/toolchain-output"
          mv "$ARCHIVE_NAME" "${ARCHIVE_NAME}.sha256" "$GITHUB_WORKSPACE/toolchain-output/"
          
          echo "Package size: $(du -h "$GITHUB_WORKSPACE/toolchain-output/$ARCHIVE_NAME" | cut -f1)"

      - name: Upload to Releases
        if: steps.check_cache.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$GITHUB_WORKSPACE/toolchain-output"
          
          CACHE_KEY="${{ steps.cache_key.outputs.key }}"
          ARCHIVE_NAME="${CACHE_KEY}.tar.zst"
          
          # 创建 Release（如果不存在）
          gh release create "$CACHE_KEY" \
            --title "Toolchain: ${{ inputs.platform }} @ ${{ inputs.openwrt_version }}" \
            --notes "Automated toolchain build for OpenWrt ${{ inputs.openwrt_version }} on ${{ inputs.platform }} platform." \
            --prerelease || true
          
          # 上传工具链包
          gh release upload "$CACHE_KEY" "$ARCHIVE_NAME" "${ARCHIVE_NAME}.sha256" \
            --clobber || gh release upload "$CACHE_KEY" "$ARCHIVE_NAME" "${ARCHIVE_NAME}.sha256"

      - name: Summary
        run: |
          echo "## Toolchain Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ inputs.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ inputs.openwrt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Key | \`${{ steps.cache_key.outputs.key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Exists | \`${{ steps.check_cache.outputs.exists }}\` |" >> $GITHUB_STEP_SUMMARY
