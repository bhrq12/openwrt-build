name: Toolchain Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - ipq40xx
          - x86_64
          - bcm2711
          - ramips-mt7621
      openwrt_version:
        description: "OpenWrt source (branch/tag/commit)"
        required: true
        default: "master"
        type: string

  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      openwrt_version:
        required: false
        type: string
        default: "master"

env:
  OPENWRT_REPO: https://github.com/coolsnowwolf/lede

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      # ========== 精准 Hash: 只取 tools/toolchain 目录的 commit ==========
      - name: Generate toolchain hash (tools/toolchain only)
        id: tc_hash
        run: |
          REPO="$OPENWRT_REPO"
          VERSION="${{ inputs.openwrt_version }}"

          TEMP_DIR=$(mktemp -d)
          git clone --depth=1 -b "$VERSION" "$REPO" "$TEMP_DIR/openwrt" 2>/dev/null || {
            echo "ERROR: Clone failed"
            rm -rf "$TEMP_DIR"
            exit 1
          }

          TC_HASH=$(cd "$TEMP_DIR/openwrt" && git log --pretty=tformat:"%H" -n1 tools toolchain 2>/dev/null || echo "")

          if [[ -z "$TC_HASH" ]]; then
            TC_HASH=$(git ls-remote "$REPO" refs/heads/$VERSION 2>/dev/null | head -c 7 || echo "unknown")
          fi

          rm -rf "$TEMP_DIR"

          CACHE_KEY="toolchain-${{ inputs.platform }}-${TC_HASH}"
          echo "hash=$TC_HASH" >> $GITHUB_OUTPUT
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Toolchain hash: $TC_HASH"
          echo "Cache key: $CACHE_KEY"

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zstd \
            zlib1g-dev file make pkg-config coreutils

      - name: Clone OpenWrt source (with retry)
        run: |
          SOURCE_DIR="${{ github.workspace }}/openwrt"
          VERSION="${{ inputs.openwrt_version }}"
          RETRY=3
          INTERVAL=10

          for i in $(seq 1 $RETRY); do
            echo "Cloning OpenWrt ($i/$RETRY)..."
            if git clone --depth=1 -b "$VERSION" "$OPENWRT_REPO" "$SOURCE_DIR" 2>&1; then
              echo "Clone successful"
              exit 0
            else
              echo "Clone failed, attempt $i/$RETRY"
              rm -rf "$SOURCE_DIR"
              [[ $i -lt $RETRY ]] && sleep $INTERVAL
            fi
          done

          echo "ERROR: Clone failed after $RETRY attempts"
          exit 1

      - name: Apply platform config
        run: |
          cd "${{ github.workspace }}/openwrt"

          CONFIG_FILE="${{ github.workspace }}/configs/${{ inputs.platform }}.config"
          PLACEHOLDER="${{ github.workspace }}/configs/${{ inputs.platform }}.config.placeholder"

          if [[ -f "$CONFIG_FILE" ]]; then
            cp "$CONFIG_FILE" .config
          elif [[ -f "$PLACEHOLDER" ]]; then
            cp "$PLACEHOLDER" .config
          else
            echo "ERROR: No config for platform ${{ inputs.platform }}"
            exit 1
          fi

          # 强制编译工具链
          cat >> .config << 'EOF'
CONFIG_TOOLCHAINOPTS=y
CONFIG_DEVEL=y
CONFIG_CCACHE=n
EOF

          make defconfig

      - name: Build toolchain
        run: |
          cd "${{ github.workspace }}/openwrt"

          echo "=== Building toolchain ==="
          echo "Platform: ${{ inputs.platform }}"
          echo "Target: $(grep CONFIG_TARGET_ .config | head -1)"

          if ! make toolchain -j$(nproc) V=s 2>&1 | tee "${{ github.workspace }}/logs/toolchain_build.log"; then
            echo "Toolchain build failed, retrying with single thread..."
            make toolchain -j1 V=s 2>&1 | tee -a "${{ github.workspace }}/logs/toolchain_build.log"
          fi

          echo "Toolchain build complete"

      - name: Package toolchain
        run: |
          cd "${{ github.workspace }}/openwrt"

          TC_HASH="${{ steps.tc_hash.outputs.hash }}"
          CACHE_KEY="${{ steps.tc_hash.outputs.key }}"
          ARCHIVE_NAME="${CACHE_KEY}.tar.zst"
          OUTPUT_DIR="${{ github.workspace }}/toolchain_output"

          mkdir -p "$OUTPUT_DIR"

          echo "Packaging: toolchain + build_dir + staging_dir"
          echo "Archive: $ARCHIVE_NAME"

          tar -I "zstd -19" -cf "$OUTPUT_DIR/$ARCHIVE_NAME" \
            toolchain/ \
            build_dir/ \
            staging_dir/

          # 写 Hash 文件（小文件，先比对再决定是否下载完整包）
          echo "$TC_HASH" > "$OUTPUT_DIR/${CACHE_KEY}.hash"

          # SHA256 校验和
          sha256sum "$OUTPUT_DIR/$ARCHIVE_NAME" > "$OUTPUT_DIR/${ARCHIVE_NAME}.sha256"

          echo ""
          echo "Package size: $(du -h "$OUTPUT_DIR/$ARCHIVE_NAME" | cut -f1)"
          echo "Hash: $TC_HASH"

      - name: Upload to Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="${{ github.workspace }}/toolchain_output"
          CACHE_KEY="${{ steps.tc_hash.outputs.key }}"
          ARCHIVE_NAME="${CACHE_KEY}.tar.zst"

          echo "Creating/updating release: $CACHE_KEY"

          # 创建 Release
          gh release create "$CACHE_KEY" \
            --title "Toolchain: ${{ inputs.platform }} @ ${{ inputs.openwrt_version }}" \
            --notes "Automated toolchain build.

Platform: ${{ inputs.platform }}
Source: $OPENWRT_REPO (${{ inputs.openwrt_version }})
Hash (tools/toolchain): ${{ steps.tc_hash.outputs.hash }}

Files:
- ${ARCHIVE_NAME}  (full toolchain: toolchain/ + build_dir/ + staging_dir/)
- ${ARCHIVE_NAME}.sha256  (checksum)
- ${CACHE_KEY}.hash  (hash for cache verification)

This toolchain was built because the tools/toolchain directory changed.
Subsequent builds of the same hash will reuse this cached toolchain." \
            --prerelease || true

          # 上传所有文件
          gh release upload "$CACHE_KEY" \
            "$OUTPUT_DIR/$ARCHIVE_NAME" \
            "$OUTPUT_DIR/${ARCHIVE_NAME}.sha256" \
            "$OUTPUT_DIR/${CACHE_KEY}.hash" \
            --clobber

          echo ""
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$CACHE_KEY"

      - name: Summary
        run: |
          echo "## Toolchain Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ inputs.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ inputs.openwrt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Hash | \`${{ steps.tc_hash.outputs.hash }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Key | \`${{ steps.tc_hash.outputs.key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`${{ steps.tc_hash.outputs.key }}.tar.zst\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next**: When tools/toolchain directories have the same hash, builds will reuse this toolchain automatically." >> $GITHUB_STEP_SUMMARY
